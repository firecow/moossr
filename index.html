<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpine + Bun SSR</title>
  <script src="https://cdn.jsdelivr.net/npm/pinecone-router@7.5.0/dist/router.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 2rem auto; }
    nav { display: flex; gap: 1rem; margin-bottom: 2rem; }
    nav a { text-decoration: none; color: #0066cc; }
    nav a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
  </style>
</head>
<body>
  <div x-data>
    <nav>
      <a href="/" x-link>Home</a>
      <a href="/about" x-link>About</a>
    </nav>

    <template x-route="/">
      <div x-data="{ users: [] }" x-init="users = await (await fetch('/api/users')).json()">
        <h1>Users</h1>
        <table>
          <thead>
            <tr><th>Name</th><th>Role</th></tr>
          </thead>
          <tbody>
            <template x-for="user in users" :key="user.id">
              <tr>
                <td x-text="user.name"></td>
                <td x-text="user.role"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>

    <template x-route="/about">
      <div>
        <h1>About</h1>
        <p>A demo of Alpine.js + Bun with SSR and client-side routing.</p>
      </div>
    </template>
  </div>
</body>
</html>
