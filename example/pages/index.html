<moo-head>
  <title>Albums - MooSSR</title>
  <meta name="description" content="Browse our album collection">
</moo-head>

<script>
const albums = await fetch('https://jsonplaceholder.typicode.com/albums').then(r => r.json());
</script>

<div>
  <h1>Albums</h1>
  <div class="grid">
    <template x-for="album in albums" :key="album.id">
      <album-card></album-card>
    </template>
  </div>
</div>
