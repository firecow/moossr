<moo-head>
  <title>Games - MooSSR</title>
  <meta name="description" content="Browse our game collection">
</moo-head>

<script>
const games = await fetch('https://jsonplaceholder.typicode.com/albums').then(r => r.json());
</script>

<div>
  <h1>Games</h1>
  <div class="grid">
    <template x-for="game in games" :key="game.id">
      <game-tile></game-tile>
    </template>
  </div>
</div>
