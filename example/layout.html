<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MooSSR</title>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.15.0/cdn.min.js" integrity="sha384-ZzplbkDNw4d2hjWc+D9EcDIgXEUybwPr2Slhix4BTtvQO3JbK60Av543BvQT9gTu" crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 2rem auto; }
    nav { display: flex; gap: 1rem; margin-bottom: 2rem; }
    nav a { text-decoration: none; color: #0066cc; }
    nav a:hover { text-decoration: underline; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .album-card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
    .album-card h3 { margin: 0 0 0.5rem; }
    .album-card p { margin: 0; color: #666; }
  </style>
</head>
<body>
  <div x-data>
    <nav>
      <img src="/logo.svg" alt="MooSSR" width="32" height="32">
      <a href="/" data-link>Home</a>
      <a href="/about" data-link>About</a>
    </nav>
    <moo-route-outlet></moo-route-outlet>
  </div>
</body>
</html>
